name: Build and deploy ASP.Net Core app to Azure Web App - Mission-11-Assignment

on:
  push:
    branches:
      - Mission-13
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Build React frontend
        run: |
          cd bookstore-web
          npm ci
          npm run build

      - name: Copy React build to wwwroot
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path BookstoreApi/wwwroot
          Copy-Item -Recurse -Force bookstore-web/dist/* BookstoreApi/wwwroot/

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish BookstoreApi/BookstoreApi.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A181857DE6F3490A9EE78430517CF664 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6DD969C91E8D4DFF8A3F55AE12D23AB3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5BABE14AEC5B49E090C033C92E8E9A4A }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Mission-11-Assignment'
          slot-name: 'Production'
          package: .
